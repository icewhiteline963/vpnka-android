# Does the code still compile? — VPNka fork addition.
#
# Upstream's build.yml decodes a release keystore before it ever reaches the
# compiler, so with no secrets set it dies at "Decode Keystore" and tells us
# nothing about the source. That's a bad gate to develop behind: our very
# first fork commit could not be shown to build at all.
#
# A debug build is signed with the auto-generated debug key, so it needs no
# secrets and exercises the same compiler over the same sources. Keep this
# separate from build.yml rather than editing it — upstream merges stay clean.

name: Compile check

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: {}

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          # fetch-depth 0 is load-bearing, not boilerplate: the next steps ask
          # the AndroidLibXrayLite submodule for `git describe --tags` to pick
          # the matching libv2ray.aar. A shallow clone carries no tags, so that
          # returns empty and the download fails with "input a valid tag".
          fetch-depth: '0'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '14742923'
          packages: 'platforms;android-37.0 build-tools;37.0.0 platform-tools'

      - name: Install NDK
        # Same pin and the same ndkVersion injection as build.yml — a compile
        # check on a different toolchain would prove the wrong thing.
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --channel=0 --install "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
          sed -i '10i\
          \
              ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

      - name: Restore cached libhevtun
        id: cache-libhevtun-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        run: bash compile-hevtun.sh

      - name: Save libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ env.NDK_HOME }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Copy libhevtun
        run: cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

      - name: Fetch AndroidLibXrayLite tag
        run: |
          pushd AndroidLibXrayLite
          echo "CURRENT_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          popd

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.13
        with:
          repository: '2dust/AndroidLibXrayLite'
          tag: ${{ env.CURRENT_TAG }}
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Compile (debug — no keystore needed)
        run: |
          cd ${{ github.workspace }}/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          ./gradlew assemblePlaystoreDebug --no-daemon --stacktrace

      - name: Unit tests
        run: |
          cd ${{ github.workspace }}/V2rayNG
          ./gradlew testPlaystoreDebugUnitTest --no-daemon
